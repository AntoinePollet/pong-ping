name = "pong-ping"
compatibility_date = "2025-05-05"
compatibility_flags = [ "nodejs_compat" ]
pages_build_output_dir = "dist"

# Namespace KV pour la waitlist (créé via `wrangler kv namespace create WAITLIST`).
# ⚠️ Pour la prod, configure aussi le binding WAITLIST dans
# Cloudflare Pages → Settings → Functions → KV namespace bindings.
[[kv_namespaces]]
binding = "WAITLIST"
id = "7fc4f5f8327145a3b143adc641ee6d71"
